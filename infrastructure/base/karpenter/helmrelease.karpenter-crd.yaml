apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: karpenter-crd
  namespace: kube-system
spec:
  interval: 1m
  chart:
    spec:
      chart: karpenter-crd
      version: "1.8.1"
      sourceRef:
        kind: HelmRepository
        name: karpenter
        namespace: flux-system
  values:
    webhook:
      enabled: true