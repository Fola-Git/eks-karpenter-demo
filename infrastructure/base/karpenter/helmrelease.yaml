apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karpenter
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: karpenter
      version: "1.0.6"
      sourceRef:
        kind: HelmRepository
        name: karpenter
        namespace: flux-system
  values:
    settings:
      clusterName: scalable-demo
      interruptionQueue: scalable-demo-interruption-queue
    serviceAccount:
      create: true