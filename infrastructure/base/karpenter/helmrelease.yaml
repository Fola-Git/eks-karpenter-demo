apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: karpenter
  namespace: kube-system
spec:
  interval: 1m
  chart:
    spec:
      chart: karpenter
      version: "1.8.1"
      sourceRef:
        kind: HelmRepository
        name: karpenter
        namespace: kube-system
  dependsOn:
    - name: karpenter-crd
  install:
    crds: Skip
    remediation:
      retries: 3
  values:
    settings:
      clusterName: scalable-demo
      featureGates:
        spotToSpotConsolidation: true
      interruptionQueue: scalable-demo-interruption-queue
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam:::role
    controller:
      resources:
        requests:
          cpu: 1
          memory: 1Gi
        limits:
          cpu: 1
          memory: 1Gi