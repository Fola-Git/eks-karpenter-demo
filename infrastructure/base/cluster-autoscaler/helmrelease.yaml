apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cluster-autoscaler
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: cluster-autoscaler
      version: "9.*"
      sourceRef:
        kind: HelmRepository
        name: autoscaler
        namespace: flux-system

  values:
    autoDiscovery:
      clusterName: scalable-demo

    awsRegion: eu-west-1

    rbac:
      serviceAccount:
        create: false
        name: cluster-autoscaler

    extraArgs:
      balance-similar-node-groups: true
      skip-nodes-with-system-pods: false
